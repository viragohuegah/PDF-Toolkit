<!-- PDF to Word Page -->
<div class="feature-page">
    <div class="page-header">
        <h2>PDF to Word</h2>
        <p>Convert PDF text into an editable Word document</p>
    </div>

    <div class="page-content">
        <div class="two-column">
            <!-- Upload Area -->
            <div class="upload-section">
                <div class="upload-area" id="pdfToWordUploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h3>Upload PDF</h3>
                    <p>or click to select file</p>
                </div>
                <input type="file" id="pdfToWordFile" accept=".pdf" style="display: none;">
            </div>

            <!-- Preview -->
            <div class="settings-section">
                <h3>PDF Info</h3>
                
                <div class="preview-section" id="pdfToWordPreview" style="display: none;">
                    <img id="pdfToWordPreviewImg" src="" alt="PDF Preview">
                    <div class="file-info">
                        <p id="pdfToWordFileName"></p>
                        <p id="pdfToWordFileSize"></p>
                    </div>
                    <button class="btn btn-primary btn-large" id="pdfToWordBtn">
                        <i class="fas fa-file-word"></i> Convert to Word
                    </button>
                </div>
            </div>
        </div>

        <!-- Progress -->
        <div id="pdfToWordProgress" class="progress-section" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="pdfToWordProgressFill"></div>
            </div>
            <p id="pdfToWordProgressText">Converting to Word...</p>
        </div>

        <!-- Result -->
        <div id="pdfToWordResult" class="result-section" style="display: none;">
            <div class="result-card success">
                <i class="fas fa-check-circle"></i>
                <h3>Word Conversion Successful!</h3>
                <div class="result-stats">
                    <div class="stat">
                        <span>Pages:</span>
                        <strong id="pdfToWordLength"></strong>
                    </div>
                </div>
                <div class="result-actions">
                    <button class="btn btn-primary" id="pdfToWordDownloadBtn">
                        <i class="fas fa-download"></i> Download DOCX
                    </button>
                    <button class="btn btn-secondary" onclick="location.reload()">
                        <i class="fas fa-redo"></i> Convert More
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    if (document.querySelector('#pdfToWordFile')) {
        const uploadArea = document.getElementById('pdfToWordUploadArea');
        const fileInput = document.getElementById('pdfToWordFile');
        const convertBtn = document.getElementById('pdfToWordBtn');
        let selectedFile = null;
        let fileId = null;

        uploadArea.addEventListener('click', (e) => {
            if (!e.target.closest('.preview-section')) {
                fileInput.click();
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
                    selectedFile = file;
                    showPreview(selectedFile);
                } else {
                    showToast('Please select a PDF file', 'error');
                    fileInput.value = '';
                }
            }
        });

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        uploadArea.addEventListener('dragover', (e) => {
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', (e) => {
            if (e.target === uploadArea) {
                uploadArea.classList.remove('dragover');
            }
        });

        uploadArea.addEventListener('drop', (e) => {
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
                    selectedFile = file;
                    showPreview(selectedFile);
                } else {
                    showToast('Please drop a PDF file', 'error');
                }
            }
        });

        async function showPreview(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/preview/thumbnail', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById('pdfToWordPreviewImg').src = data.thumbnail;
                    document.getElementById('pdfToWordFileName').textContent = file.name;
                    document.getElementById('pdfToWordFileSize').textContent = 
                        'Size: ' + (file.size / 1024 / 1024).toFixed(2) + ' MB';
                    document.getElementById('pdfToWordPreview').style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading preview:', error);
            }
        }

        convertBtn.addEventListener('click', convertToWord);

        async function convertToWord() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            document.getElementById('pdfToWordProgress').style.display = 'block';
            convertBtn.disabled = true;

            try {
                const response = await fetch('/api/convert/pdf-to-word', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    fileId = data.file_id;
                    showResult(data);
                    saveToHistory('PDF to Word', selectedFile.name, 'word_' + fileId + '.docx');
                } else {
                    showToast('Conversion failed: ' + data.detail, 'error');
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            } finally {
                document.getElementById('pdfToWordProgress').style.display = 'none';
                convertBtn.disabled = false;
            }
        }

        function showResult(data) {
            document.getElementById('pdfToWordLength').textContent = 
                data.page_count + ' pages';
            
            document.getElementById('pdfToWordDownloadBtn').onclick = () => {
                window.location.href = '/api/convert/download-word/' + fileId;
            };

            document.getElementById('pdfToWordResult').style.display = 'block';
            document.getElementById('pdfToWordProgress').style.display = 'none';
            document.getElementById('pdfToWordPreview').style.display = 'none';
        }
    }
})();
</script>
