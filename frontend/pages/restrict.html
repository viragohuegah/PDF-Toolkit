<!-- Restrict PDF Page -->
<div class="feature-page">
    <div class="page-header">
        <h2>Restrict PDF</h2>
        <p>Disable print, copy, and edit permissions</p>
    </div>

    <div class="page-content">
        <div class="two-column">
            <!-- Upload Area -->
            <div class="upload-section">
                <div class="upload-area" id="restrictUploadArea">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h3>Upload PDF</h3>
                    <p>or click to select file</p>
                </div>
                <input type="file" id="restrictFile" accept=".pdf" style="display: none;">
            </div>

            <!-- Settings -->
            <div class="settings-section">
                <h3>Restrictions</h3>
                
                <div class="preview-section" id="restrictPreview" style="display: none;">
                    <img id="restrictPreviewImg" src="" alt="PDF Preview">
                    <div class="file-info">
                        <p id="restrictFileName"></p>
                    </div>
                </div>

                <div id="restrictSettings" style="display: none;">
                    <div class="form-group checkbox">
                        <input type="checkbox" id="restrictPrint" checked>
                        <label for="restrictPrint">Disable Printing</label>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="restrictEdit" checked>
                        <label for="restrictEdit">Disable Editing</label>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="restrictCopy" checked>
                        <label for="restrictCopy">Disable Copying</label>
                    </div>

                    <button class="btn btn-primary btn-large" id="restrictBtn">
                        <i class="fas fa-ban"></i> Apply Restrictions
                    </button>
                </div>
            </div>
        </div>

        <!-- Progress -->
        <div id="restrictProgress" class="progress-section" style="display: none;">
            <div class="progress-bar">
                <div class="progress-fill" id="restrictProgressFill"></div>
            </div>
            <p>Applying restrictions...</p>
        </div>

        <!-- Result -->
        <div id="restrictResult" class="result-section" style="display: none;">
            <div class="result-card success">
                <i class="fas fa-check-circle"></i>
                <h3>Restrictions Applied Successfully!</h3>
                <p>PDF permissions have been updated</p>
                <div class="result-actions">
                    <button class="btn btn-primary" id="restrictDownloadBtn">
                        <i class="fas fa-download"></i> Download
                    </button>
                    <button class="btn btn-secondary" onclick="location.reload()">
                        <i class="fas fa-redo"></i> Restrict More
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    if (document.querySelector('#restrictFile')) {
        const uploadArea = document.getElementById('restrictUploadArea');
        const fileInput = document.getElementById('restrictFile');
        const restrictBtn = document.getElementById('restrictBtn');
        const printCheckbox = document.getElementById('restrictPrint');
        const editCheckbox = document.getElementById('restrictEdit');
        const copyCheckbox = document.getElementById('restrictCopy');
        let selectedFile = null;
        let fileId = null;

        uploadArea.addEventListener('click', (e) => {
            if (!e.target.closest('.preview-section')) {
                fileInput.click();
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const file = e.target.files[0];
                if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
                    selectedFile = file;
                    showPreview(selectedFile);
                } else {
                    showToast('Please select a PDF file', 'error');
                    fileInput.value = '';
                }
            }
        });

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        uploadArea.addEventListener('dragover', (e) => {
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', (e) => {
            if (e.target === uploadArea) {
                uploadArea.classList.remove('dragover');
            }
        });

        uploadArea.addEventListener('drop', (e) => {
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
                    selectedFile = file;
                    showPreview(selectedFile);
                } else {
                    showToast('Please drop a PDF file', 'error');
                }
            }
        });

        async function showPreview(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/preview/thumbnail', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById('restrictPreviewImg').src = data.thumbnail;
                    document.getElementById('restrictFileName').textContent = file.name;
                    document.getElementById('restrictPreview').style.display = 'block';
                    document.getElementById('restrictSettings').style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading preview:', error);
            }
        }

        restrictBtn.addEventListener('click', restrictPDF);

        async function restrictPDF() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('can_print', !printCheckbox.checked);
            formData.append('can_edit', !editCheckbox.checked);
            formData.append('can_copy', !copyCheckbox.checked);

            document.getElementById('restrictProgress').style.display = 'block';
            restrictBtn.disabled = true;

            try {
                const response = await fetch('/api/security/restrict-pdf', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    fileId = data.file_id;
                    showResult();
                    saveToHistory('Restrict', selectedFile.name, 'restricted_' + fileId + '.pdf');
                } else {
                    showToast('Restriction failed: ' + data.detail, 'error');
                }
            } catch (error) {
                showToast('Error: ' + error.message, 'error');
            } finally {
                document.getElementById('restrictProgress').style.display = 'none';
                restrictBtn.disabled = false;
            }
        }

        function showResult() {
            document.getElementById('restrictDownloadBtn').onclick = () => {
                window.location.href = '/api/security/download/' + fileId + '/restricted';
            };

            document.getElementById('restrictResult').style.display = 'block';
            document.getElementById('restrictProgress').style.display = 'none';
            document.getElementById('restrictSettings').style.display = 'none';
            document.getElementById('restrictPreview').style.display = 'none';
        }
    }
})();
</script>
