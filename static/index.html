<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Toolkit</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f5;
      margin: 0;
      padding: 40px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
      max-width: 1200px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
    }

    input, select, button {
      width: 100%;
      margin-top: 10px;
      padding: 11px;
      border-radius: 10px;
      border: 1px solid #ddd;
      box-sizing: border-box;
    }

    button {
      background: #111827;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .history {
      max-width: 1200px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 16px;
    }

    .history-item {
      background: #f9fafb;
      padding: 10px;
      border-radius: 10px;
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h1>PDF Toolkit</h1>

<div class="grid">

  <div class="card">
    <h3>Compress PDF</h3>
    <form data-endpoint="/compress">
      <input type="file" name="file" accept="application/pdf" required>
      <select name="quality">
        <option value="screen">Smallest</option>
        <option value="ebook" selected>Medium</option>
        <option value="printer">High</option>
        <option value="prepress">Very High</option>
      </select>
      <button>Compress</button>
    </form>
  </div>

  <div class="card">
    <h3>Merge PDF</h3>
    <form data-endpoint="/merge">
      <input type="file" name="files" accept="application/pdf" multiple required>
      <button>Merge</button>
    </form>
  </div>

  <div class="card">
    <h3>Split PDF</h3>
    <form data-endpoint="/split">
      <input type="file" name="file" accept="application/pdf" required>
      <button>Split</button>
    </form>
  </div>

  <div class="card">
    <h3>PDF to Image</h3>
    <form data-endpoint="/pdf-to-image">
      <input type="file" name="file" accept="application/pdf" required>
      <select name="image_format">
        <option value="png">PNG</option>
        <option value="jpg">JPG</option>
      </select>
      <button>Convert</button>
    </form>
  </div>

  <div class="card">
    <h3>Image to PDF</h3>
    <form data-endpoint="/image-to-pdf">
      <input type="file" name="files" accept="image/png,image/jpeg" multiple required>
      <button>Convert</button>
    </form>
  </div>

  <div class="card">
    <h3>PDF to Text</h3>
    <form data-endpoint="/pdf-to-text">
      <input type="file" name="file" accept="application/pdf" required>
      <button>Extract Text</button>
    </form>
  </div>

  <div class="card">
    <h3>Protect PDF</h3>
    <form data-endpoint="/protect">
      <input type="file" name="file" accept="application/pdf" required>
      <input type="password" name="password" placeholder="Password" required>
      <button>Protect</button>
    </form>
  </div>

  <div class="card">
    <h3>Unlock PDF</h3>
    <form data-endpoint="/unlock">
      <input type="file" name="file" accept="application/pdf" required>
      <input type="password" name="password" placeholder="Original Password" required>
      <button>Unlock</button>
    </form>
  </div>

  <div class="card">
    <h3>Restrict Permission</h3>
    <form data-endpoint="/restrict">
      <input type="file" name="file" accept="application/pdf" required>
      <input type="password" name="password" placeholder="Owner Password" required>
      <button>Restrict</button>
    </form>
  </div>

  <div class="card">
    <h3>Watermark PDF</h3>
    <form data-endpoint="/watermark">
      <input type="file" name="file" accept="application/pdf" required>
      <input type="text" name="text" placeholder="Watermark text" value="CONFIDENTIAL">
      <button>Add Watermark</button>
    </form>
  </div>

  <div class="card">
    <h3>Preview Mode</h3>
    <form data-endpoint="/preview">
      <input type="file" name="file" accept="application/pdf" required>
      <button>Preview</button>
    </form>
  </div>

</div>

<div class="history">
  <h2>Download History</h2>
  <div id="historyList"></div>
  <button onclick="clearHistory()">Clear History</button>
</div>

<script>
  const forms = document.querySelectorAll("form");
  const historyList = document.getElementById("historyList");

  function getHistory() {
    return JSON.parse(sessionStorage.getItem("downloadHistory")) || [];
  }

  function saveHistory(item) {
    const history = getHistory();
    history.unshift(item);
    sessionStorage.setItem("downloadHistory", JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const history = getHistory();

    if (history.length === 0) {
      historyList.innerHTML = "<p>Belum ada file diproses.</p>";
      return;
    }

    historyList.innerHTML = history.map(item => `
      <div class="history-item">
        <strong>${item.tool}</strong><br>
        File: ${item.file}<br>
        Time: ${item.time}
      </div>
    `).join("");
  }

  function clearHistory() {
    sessionStorage.removeItem("downloadHistory");
    renderHistory();
  }

  forms.forEach(form => {
    form.addEventListener("submit", async e => {
      e.preventDefault();

      const endpoint = form.dataset.endpoint;
      const formData = new FormData(form);
      const button = form.querySelector("button");
      const title = form.parentElement.querySelector("h3").textContent;

      button.disabled = true;
      button.textContent = "Processing...";

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          body: formData
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || "Gagal proses file");
        }

        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);

        let filename = "result";
        const disposition = res.headers.get("content-disposition");

        if (disposition && disposition.includes("filename=")) {
          filename = disposition.split("filename=")[1].replaceAll('"', "");
        }

        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();

        window.URL.revokeObjectURL(url);

        saveHistory({
          tool: title,
          file: filename,
          time: new Date().toLocaleString("id-ID")
        });

      } catch (err) {
        alert(err.message);
      } finally {
        button.disabled = false;
        button.textContent = title.split(" ")[0];
      }
    });
  });

  renderHistory();
</script>

</body>
</html>
